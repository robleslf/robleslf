name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *" # Se ejecuta cada noche a las 00:00
  workflow_dispatch: # Permite ejecutarlo manualmente cuando quieras

permissions:
  contents: write # Permiso para que el bot pueda subir el archivo al repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: robleslf
          output_path: trophy.svg
          column: 7
          theme: shadow_blue

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git commit -m "Update trophies" || exit 0 # Si no hay cambios, no falla
          git push
