name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophies
        run: |
          # Descargamos el archivo directamente con curl
          curl "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=shadow_blue&column=7" -o github-trophies.svg

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update trophies"
          file_pattern: 'github-trophies.svg'
