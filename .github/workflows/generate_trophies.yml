name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophies
        run: |
          # 1. Borramos rastro de errores anteriores
          rm -f github-trophies.svg
          
          # 2. Descarga limpia (Sin temas extra para asegurar que el servidor responda)
          # Usamos un tema que es imposible que falle: 'flat' o simplemente nada.
          curl -L "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=flat" -o github-trophies.svg
          
          # 3. Verificamos si lo que bajamos es un SVG real o un error
          if grep -q "<svg" github-trophies.svg; then
            echo "Imagen descargada correctamente"
          else
            echo "Error: El servidor no devolvió una imagen válida"
            exit 1
          fi

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update trophies flat theme"
          file_pattern: 'github-trophies.svg'
