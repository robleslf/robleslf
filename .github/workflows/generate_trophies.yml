name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophies
        run: |
          # Borramos el archivo viejo por si acaso
          rm -f github-trophies.svg
          # Descargamos usando el tema 'ocean' (el azul de los trofeos)
          curl -L -H "User-Agent: Mozilla/5.0" "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=ocean&column=7" -o github-trophies.svg

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update trophies with ocean theme"
          file_pattern: 'github-trophies.svg'
