name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ESTE PASO BORRA CUALQUIER CARPETA QUE ESTÉ MOLESTANDO
      - name: Clean potential directories
        run: |
          rm -rf github-trophies.svg
          rm -rf trophy.svg

      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: ${{ github.repository_owner }}
          output_path: github-trophies.svg
          theme: shadow_blue
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update trophies"
          file_pattern: 'github-trophies.svg'
